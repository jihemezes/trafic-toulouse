<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1f26"/>
      <stop offset="1" stop-color="#101216"/>
    </linearGradient>
    <radialGradient id="island" cx="0.35" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#3ddb82"/>
      <stop offset="1" stop-color="#2aa35c"/>
    </radialGradient>
  </defs>

  <!-- fond -->
  <rect width="256" height="256" fill="url(#bg)"/>

  <!-- chaussee (sous-couche grise) -->
  <path d="M 128 96 L 128 20" stroke="#3a3f4a" stroke-width="26" stroke-linecap="round"/>
  <path d="M 160 128 L 236 128" stroke="#3a3f4a" stroke-width="26" stroke-linecap="round"/>
  <path d="M 128 160 L 128 236" stroke="#3a3f4a" stroke-width="26" stroke-linecap="round"/>
  <path d="M 96 128 L 20 128" stroke="#3a3f4a" stroke-width="26" stroke-linecap="round"/>

  <!-- flux colore par voie -->
  <path d="M 128 96 L 128 26" stroke="#34c26b" stroke-width="12" stroke-linecap="round"/>
  <path d="M 160 128 L 230 128" stroke="#f5a623" stroke-width="12" stroke-linecap="round"/>
  <path d="M 128 160 L 128 230" stroke="#e2493b" stroke-width="12" stroke-linecap="round"/>
  <path d="M 96 128 L 26 128" stroke="#8b1e14" stroke-width="12" stroke-linecap="round"/>

  <!-- marquages pointilles -->
  <path d="M 128 94 L 128 30" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="7 8" stroke-linecap="round"/>
  <path d="M 162 128 L 228 128" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="7 8" stroke-linecap="round"/>
  <path d="M 128 162 L 128 228" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="7 8" stroke-linecap="round"/>
  <path d="M 94 128 L 30 128" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="7 8" stroke-linecap="round"/>

  <!-- anneau du rond-point (chaussee circulaire) -->
  <circle cx="128" cy="128" r="46" fill="none" stroke="#3a3f4a" stroke-width="22"/>

  <!-- ilot central -->
  <circle cx="128" cy="128" r="30" fill="url(#island)"/>
  <circle cx="128" cy="128" r="30" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
</svg>
