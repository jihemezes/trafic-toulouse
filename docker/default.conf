server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    # La config générée ne doit JAMAIS être mise en cache par le navigateur
    # (sinon un changement de variable d'environnement passerait inaperçu)
    location = /config.js {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # app.js et index.html : jamais de cache long non plus. Ce sont de
    # petits fichiers texte ; le coût d'un cache court est négligeable,
    # alors qu'un cache long fait tourner une VERSION OBSOLÈTE du
    # JavaScript après chaque mise à jour de l'application — source de
    # bugs très déroutants (fonctionnalité visible en HTML mais inactive
    # car le JS chargé est encore l'ancien).
    location ~* \.(js|html)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Le template n'a rien à faire côté client
    location = /config.js.template { return 404; }

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600";
    }
}
